version: 2.1

jobs:

  # ── JOB 1: Run Tests ──────────────────────────
  test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r requirements.txt
      - run:
          name: Run unit tests
          command: pytest tests/ -v

  # ── JOB 2: Build & Push Docker Image ──────────
  build-and-push:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: false
      - run:
          name: Build Docker image
          command: |
            IMAGE_NAME="$DOCKER_USERNAME/flask-devops-app"
            docker build -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$CIRCLE_SHA1" .
      - run:
          name: Login & push to Docker Hub
          command: |
            IMAGE_NAME="$DOCKER_USERNAME/flask-devops-app"
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker push "$IMAGE_NAME:latest"
            docker push "$IMAGE_NAME:$CIRCLE_SHA1"

  # ── JOB 3: Deploy to Render ───────────────────
  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Trigger deployment on Render
          command: |
            curl -X POST $RENDER_DEPLOY_HOOK_URL

  # ── JOB 4: Send Slack Notification ───────────
  notify:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Send Slack Notification
          command: |
            curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \"🚀 *Deployment Successful!*\n*Project:* Flask DevOps App\n*Triggered by:* config.yaml change\n*Branch:* $CIRCLE_BRANCH\n*Build:* #$CIRCLE_BUILD_NUM\n*Status:* All tests passed ✅\n*Live URL:* https://flask-circleci-project.onrender.com\"
            }"

# ── WORKFLOW ───────────────────────────────────
workflows:
  ci-cd-pipeline:
    jobs:
      - test
      - build-and-push:
          requires:
            - test
      - deploy:
          requires:
            - build-and-push
      - notify:
          requires:
            - deploy